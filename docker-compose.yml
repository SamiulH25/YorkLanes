# Local PostgreSQL (legacy alternative to Supabase local).
# Prefer: npm run supabase:start from repo root.
# Start with: docker compose up -d

services:
  db:
    image: postgres:16-alpine
    container_name: yorklanes-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: yorklanes
      POSTGRES_PASSWORD: yorklanes_dev
      POSTGRES_DB: yorklanes
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  postgres_data:
